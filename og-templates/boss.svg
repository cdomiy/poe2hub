<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlowRust" cx="85%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#b0492f" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#b0492f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#16130f"/>
  <rect width="1200" height="630" fill="url(#bgGlowRust)"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#3a3226" stroke-width="1.5"/>

  <text x="60" y="90" font-family="Cinzel" font-size="30" font-weight="600" fill="#c9a24b">PoE2 Hub</text>
  <text x="60" y="118" font-family="Inter" font-size="16" fill="#6f6656" letter-spacing="2">PoE2 BOSS GUIDE · {{CATEGORY_LABEL}}</text>

  <!-- 血锈色警示条，呼应boss页的phase-item左边框 -->
  <rect x="60" y="150" width="6" height="90" fill="#b0492f"/>

  <foreignObject x="90" y="230" width="900" height="220">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Cinzel,serif; font-size:54px; font-weight:600; color:#e4dcc8; line-height:1.25;">
      {{TITLE}}
    </div>
  </foreignObject>

  <line x1="60" y1="500" x2="1140" y2="500" stroke="#3a3226" stroke-width="1"/>

  <!-- 阶段圆点：由脚本按phases.length动态拼出{{PHASE_DOTS}}，不足2阶段时脚本会改填等级文字 -->
  <g transform="translate(60, 540)">
    <text x="0" y="6" font-family="IBM Plex Mono" font-size="18" fill="#a89e88">{{PHASE_LABEL}}</text>
    {{PHASE_DOTS}}
  </g>
  <text x="1140" y="546" font-family="IBM Plex Mono" font-size="20" fill="#a89e88" text-anchor="end">Patch {{PATCH}}</text>
</svg>
